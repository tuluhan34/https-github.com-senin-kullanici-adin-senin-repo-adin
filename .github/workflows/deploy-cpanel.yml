name: Deploy Static Site to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
        run: |
          missing=0
          for key in CPANEL_FTP_HOST CPANEL_FTP_USER CPANEL_FTP_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::$key is missing in repository secrets"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Verify deploy folder
        run: |
          test -f clean-upload/index.html
          test -d clean-upload/_next

      - name: Probe FTP endpoint (port 21)
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
        run: |
          echo "Checking TCP connection to $CPANEL_FTP_HOST:21"
          timeout 10 bash -c "</dev/tcp/$CPANEL_FTP_HOST/21" && echo "TCP_OK" || (echo "::error::Cannot reach FTP endpoint on port 21" && exit 1)

      - name: Deploy via FTP (attempt 1)
        id: deploy_ftp
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: clean-upload/
          server-dir: /public_html/
          dangerous-clean-slate: false

      - name: Deploy via FTPS (attempt 2)
        id: deploy_ftps
        if: steps.deploy_ftp.outcome != 'success'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: clean-upload/
          server-dir: /public_html/
          dangerous-clean-slate: false

      - name: Check deployment result
        run: |
          ftp_outcome="${{ steps.deploy_ftp.outcome }}"
          ftps_outcome="${{ steps.deploy_ftps.outcome }}"

          if [ "$ftp_outcome" = "success" ] || [ "$ftps_outcome" = "success" ]; then
            echo "Deployment succeeded. ftp=$ftp_outcome ftps=$ftps_outcome"
            exit 0
          fi

          echo "::error::Both FTP and FTPS deploy attempts failed. Check CPANEL_FTP_HOST / CPANEL_FTP_USER / CPANEL_FTP_PASSWORD values and FTP account permissions."
          exit 1
