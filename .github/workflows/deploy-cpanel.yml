name: Deploy Static Site to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy_cpanel:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
        run: |
          missing=0
          for key in CPANEL_FTP_HOST CPANEL_FTP_USER CPANEL_FTP_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::$key is missing in repository secrets"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Verify deploy folder
        run: |
          test -f clean-upload/index.html
          test -d clean-upload/_next

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy via exhaustive host/protocol attempts
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
        run: |
          set -euo pipefail

          hosts=(
            "$CPANEL_FTP_HOST"
            "34motokuryeistanbul.com"
            "www.34motokuryeistanbul.com"
            "ftp.34motokuryeistanbul.com"
            "panel.34motokuryeistanbul.com"
            "api.34motokuryeistanbul.com"
          )

          protocols=(ftp ftps)
          ports=(21 22)

          # Remove empty/duplicate hosts while preserving order.
          uniq_hosts=()
          for h in "${hosts[@]}"; do
            [ -z "$h" ] && continue
            skip=0
            for uh in "${uniq_hosts[@]}"; do
              [ "$uh" = "$h" ] && skip=1 && break
            done
            [ "$skip" -eq 0 ] && uniq_hosts+=("$h")
          done

          attempt=0
          for host in "${uniq_hosts[@]}"; do
            for protocol in "${protocols[@]}"; do
              for port in "${ports[@]}"; do
                attempt=$((attempt + 1))
                echo "Attempt #$attempt -> $protocol://$host:$port"

                set +e
                lftp -u "$CPANEL_FTP_USER","$CPANEL_FTP_PASSWORD" "$protocol://$host:$port" -e "set net:timeout 8; set net:max-retries 1; set ssl:verify-certificate no; mirror -R --delete --verbose=1 clean-upload /public_html; bye"
                code=$?
                set -e

                if [ "$code" -eq 0 ]; then
                  echo "Deployment succeeded on $protocol://$host:$port"
                  exit 0
                fi
              done
            done
          done

          echo "::error::All host/protocol/port deployment attempts failed. cPanel server hostname is required in CPANEL_FTP_HOST."
          exit 1

  deploy_github_pages:
    runs-on: ubuntu-latest
    needs: deploy_cpanel
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: clean-upload

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
