name: Deploy Production to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy_cpanel:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Verify build output
        run: |
          test -f out/index.html
          test -d out/_next

      - name: Validate required secrets
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
        run: |
          missing=0
          for key in CPANEL_FTP_HOST CPANEL_FTP_USER CPANEL_FTP_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::warning::$key is missing in repository secrets"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "Skipping cPanel deploy because required secrets are missing."
            exit 0
          fi

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy out/ via exhaustive host/protocol attempts
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
        run: |
          set -euo pipefail

          start_ts="$(date +%s)"
          max_seconds=540
          max_attempts=24

          hosts=(
            "$CPANEL_FTP_HOST"
            "34motokuryeistanbul.com"
            "www.34motokuryeistanbul.com"
            "ftp.34motokuryeistanbul.com"
          )

          protocols=(ftp ftps)
          ports=(21)
          remote_paths=(
            "/public_html"
            "/public_html/34motokuryeistanbul.com"
            "/domains/34motokuryeistanbul.com/public_html"
          )
          verify_url="https://34motokuryeistanbul.com/"
          verify_marker="Hemen Kurye Cagir"

          uniq_hosts=()
          for h in "${hosts[@]}"; do
            [ -z "$h" ] && continue
            skip=0
            for uh in "${uniq_hosts[@]}"; do
              [ "$uh" = "$h" ] && skip=1 && break
            done
            [ "$skip" -eq 0 ] && uniq_hosts+=("$h")
          done

          attempt=0
          for host in "${uniq_hosts[@]}"; do
            for protocol in "${protocols[@]}"; do
              for port in "${ports[@]}"; do
                attempt=$((attempt + 1))
                now_ts="$(date +%s)"
                elapsed="$((now_ts - start_ts))"
                if [ "$attempt" -gt "$max_attempts" ] || [ "$elapsed" -gt "$max_seconds" ]; then
                  echo "Stopping deploy attempts after ${attempt} attempts and ${elapsed}s."
                  echo "::warning::cPanel deploy time/attempt limit reached."
                  exit 0
                fi
                echo "Attempt #$attempt -> $protocol://$host:$port"

                any_path_ok=0
                for remote_path in "${remote_paths[@]}"; do
                  echo "  -> Deploying to remote path: $remote_path"
                  set +e
                  timeout 45s lftp -u "$CPANEL_FTP_USER","$CPANEL_FTP_PASSWORD" "$protocol://$host:$port" -e "set cmd:fail-exit yes; set net:timeout 8; set net:max-retries 1; set net:reconnect-interval-base 2; set ssl:verify-certificate no; mkdir -p $remote_path; mirror -R --delete --verbose=1 out $remote_path; bye"
                  code=$?
                  set -e

                  if [ "$code" -eq 0 ]; then
                    any_path_ok=1

                    set +e
                    live_html="$(curl -k -L --max-time 20 -s "$verify_url")"
                    verify_code=$?
                    set -e

                    if [ "$verify_code" -eq 0 ] && echo "$live_html" | grep -q "$verify_marker"; then
                      echo "Deployment verified on $protocol://$host:$port $remote_path"
                      exit 0
                    fi

                    echo "Upload worked but live verify failed for path $remote_path; trying next path..."
                  fi
                done

                if [ "$any_path_ok" -eq 1 ]; then
                  echo "Deployment completed on $protocol://$host:$port"
                  exit 0
                fi
              done
            done
          done

          echo "::warning::All cPanel host/protocol attempts failed. Continuing with GitHub Pages publish fallback."
          exit 0

  deploy_github_pages:
    needs: deploy_cpanel
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Prepare GitHub Pages subpath build
        run: |
          set -e
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          DIST_DIR=".gh-pages-dist"

          rm -rf "$DIST_DIR"
          cp -a out "$DIST_DIR"

          find "$DIST_DIR" -type f -name '*.html' -print0 | xargs -0 sed -i \
            -e "s|href=\"/|href=\"/${REPO_NAME}/|g" \
            -e "s|src=\"/|src=\"/${REPO_NAME}/|g" \
            -e "s|\"/_next/|\"/${REPO_NAME}/_next/|g" \
            -e "s|\"/manifest.webmanifest|\"/${REPO_NAME}/manifest.webmanifest|g" \
            -e "s|\"/favicon.ico|\"/${REPO_NAME}/favicon.ico|g"

      - name: Publish out to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .gh-pages-dist
          publish_branch: gh-pages
          force_orphan: true
