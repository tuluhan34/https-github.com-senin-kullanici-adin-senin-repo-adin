name: Deploy Production to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy_cpanel:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Verify build output
        run: |
          test -f out/index.html
          test -d out/_next

      - name: Validate required secrets
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          CPANEL_FTP_REMOTE_PATH: ${{ secrets.CPANEL_FTP_REMOTE_PATH }}
          CPANEL_VERIFY_URL: ${{ secrets.CPANEL_VERIFY_URL }}
        run: |
          missing=0
          for key in CPANEL_FTP_HOST CPANEL_FTP_USER CPANEL_FTP_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::warning::$key is missing in repository secrets"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "Skipping cPanel deploy because required secrets are missing."
            exit 1
          fi

          if [ -n "$CPANEL_FTP_REMOTE_PATH" ]; then
            echo "Using explicit remote path from CPANEL_FTP_REMOTE_PATH"
          else
            echo "::warning::CPANEL_FTP_REMOTE_PATH is not set; workflow will try common docroot paths."
          fi

          if [ -n "$CPANEL_VERIFY_URL" ]; then
            echo "Using explicit verify URL from CPANEL_VERIFY_URL"
          else
            echo "::warning::CPANEL_VERIFY_URL is not set; workflow will verify both apex and www."
          fi

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy out/ via exhaustive host/protocol attempts
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          CPANEL_FTP_REMOTE_PATH: ${{ secrets.CPANEL_FTP_REMOTE_PATH }}
          CPANEL_VERIFY_URL: ${{ secrets.CPANEL_VERIFY_URL }}
        run: |
          set -euo pipefail

          start_ts="$(date +%s)"
          max_seconds=1140
          max_attempts=180

          host_input="$CPANEL_FTP_HOST"
          host_input="${host_input#ftp://}"
          host_input="${host_input#ftps://}"
          host_input="${host_input#sftp://}"
          host_input="${host_input%/}"

          explicit_port=""
          if [[ "$host_input" == *:* ]]; then
            explicit_port="${host_input##*:}"
            host_input="${host_input%%:*}"
          fi

          hosts=(
            "$host_input"
            "34motokuryeistanbul.com"
            "www.34motokuryeistanbul.com"
            "ftp.34motokuryeistanbul.com"
            "cpanel.34motokuryeistanbul.com"
            "panel.34motokuryeistanbul.com"
            "mail.34motokuryeistanbul.com"
            "94.73.148.10"
          )

          user_candidates=(
            "$CPANEL_FTP_USER"
            "u2629744"
            "u2629744@34motokuryeistanbul.com"
          )

          protocols=(ftp ftps sftp)
          ports=(21 22 990)
          if [ -n "$explicit_port" ]; then
            ports=("$explicit_port" "${ports[@]}")
          fi
          remote_paths=(
            "/home/u2629744/public_html"
            "."
            "/"
            "/www"
            "/httpdocs"
            "/htdocs"
            "/public_html"
            "/public_html/34motokuryeistanbul.com"
            "/public_html/www.34motokuryeistanbul.com"
            "/domains/34motokuryeistanbul.com/public_html"
            "/domains/www.34motokuryeistanbul.com/public_html"
          )

          if [ -n "$CPANEL_FTP_REMOTE_PATH" ]; then
            remote_paths=("$CPANEL_FTP_REMOTE_PATH" "${remote_paths[@]}")
          fi

          verify_urls=(
            "https://34motokuryeistanbul.com/"
            "https://www.34motokuryeistanbul.com/"
          )

          if [ -n "$CPANEL_VERIFY_URL" ]; then
            verify_urls=("$CPANEL_VERIFY_URL" "${verify_urls[@]}")
          fi
          verify_marker="Kurye"

          uniq_hosts=()
          for h in "${hosts[@]}"; do
            [ -z "$h" ] && continue
            skip=0
            for uh in "${uniq_hosts[@]}"; do
              [ "$uh" = "$h" ] && skip=1 && break
            done
            [ "$skip" -eq 0 ] && uniq_hosts+=("$h")
          done

          uniq_users=()
          for u in "${user_candidates[@]}"; do
            [ -z "$u" ] && continue
            skip=0
            for uu in "${uniq_users[@]}"; do
              [ "$uu" = "$u" ] && skip=1 && break
            done
            [ "$skip" -eq 0 ] && uniq_users+=("$u")
          done

          attempt=0
          for ftp_user in "${uniq_users[@]}"; do
            for host in "${uniq_hosts[@]}"; do
              for protocol in "${protocols[@]}"; do
                for port in "${ports[@]}"; do
                attempt=$((attempt + 1))
                now_ts="$(date +%s)"
                elapsed="$((now_ts - start_ts))"
                if [ "$attempt" -gt "$max_attempts" ] || [ "$elapsed" -gt "$max_seconds" ]; then
                  echo "Stopping deploy attempts after ${attempt} attempts and ${elapsed}s."
                  echo "::warning::cPanel deploy time/attempt limit reached."
                  exit 1
                fi
                echo "Attempt #$attempt -> user=$ftp_user $protocol://$host:$port"

                # Fast preflight: if login/listing fails, skip all remote path attempts.
                set +e
                timeout 24s lftp -u "$ftp_user","$CPANEL_FTP_PASSWORD" "$protocol://$host:$port" -e "set cmd:fail-exit yes; set ftp:passive-mode yes; set net:timeout 12; set net:max-retries 1; set net:reconnect-interval-base 2; set ssl:verify-certificate no; set ssl:check-hostname no; set sftp:auto-confirm yes; cls; bye" >/dev/null 2>&1
                preflight_code=$?
                set -e

                if [ "$preflight_code" -ne 0 ]; then
                  echo "  -> Preflight login failed with user=$ftp_user on $protocol://$host:$port"
                  continue
                fi

                for remote_path in "${remote_paths[@]}"; do
                  echo "  -> Deploying to remote path: $remote_path"
                  set +e
                  timeout 70s lftp -u "$ftp_user","$CPANEL_FTP_PASSWORD" "$protocol://$host:$port" -e "set cmd:fail-exit yes; set ftp:passive-mode yes; set net:timeout 12; set net:max-retries 1; set net:reconnect-interval-base 2; set ssl:verify-certificate no; set ssl:check-hostname no; set sftp:auto-confirm yes; mkdir -p $remote_path; mirror -R --delete --verbose=1 out/ $remote_path; bye"
                  code=$?
                  set -e

                  if [ "$code" -eq 0 ]; then
                    for verify_url in "${verify_urls[@]}"; do
                      set +e
                      live_html="$(curl -k -L --max-time 20 -s "$verify_url")"
                      verify_code=$?
                      set -e

                      if [ "$verify_code" -eq 0 ] && echo "$live_html" | grep -q "$verify_marker"; then
                        echo "Deployment verified on $verify_url via user=$ftp_user $protocol://$host:$port $remote_path"
                        exit 0
                      fi
                    done

                    echo "Upload worked but live verify failed for path $remote_path; trying next path..."
                  fi
                done
              done
            done
          done
          done

          echo "::error::All cPanel host/protocol attempts failed."
          exit 1

