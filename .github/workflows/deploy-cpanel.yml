name: Deploy Static Site to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
        run: |
          missing=0
          for key in CPANEL_FTP_HOST CPANEL_FTP_USER CPANEL_FTP_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::$key is missing in repository secrets"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Verify deploy folder
        run: |
          test -f clean-upload/index.html
          test -d clean-upload/_next

      - name: Resolve FTP config
        id: ftp_cfg
        env:
          FTP_PROTOCOL_VAR: ${{ vars.CPANEL_FTP_PROTOCOL }}
          FTP_PORT_VAR: ${{ vars.CPANEL_FTP_PORT }}
        run: |
          protocol="${FTP_PROTOCOL_VAR}"
          port="${FTP_PORT_VAR}"

          if [ -z "$protocol" ]; then
            protocol="ftp"
          fi

          if [ -z "$port" ]; then
            if [ "$protocol" = "ftps" ]; then
              port="21"
            else
              port="21"
            fi
          fi

          echo "protocol=$protocol" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"

      - name: Probe FTP endpoint
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          FTP_PORT: ${{ steps.ftp_cfg.outputs.port }}
        run: |
          echo "Checking TCP connection to $CPANEL_FTP_HOST:$FTP_PORT"
          timeout 10 bash -c "</dev/tcp/$CPANEL_FTP_HOST/$FTP_PORT" && echo "TCP_OK" || (echo "::error::Cannot reach FTP endpoint on configured host/port" && exit 1)

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ${{ steps.ftp_cfg.outputs.protocol }}
          port: ${{ steps.ftp_cfg.outputs.port }}
          local-dir: clean-upload/
          server-dir: /public_html/
          dangerous-clean-slate: false
