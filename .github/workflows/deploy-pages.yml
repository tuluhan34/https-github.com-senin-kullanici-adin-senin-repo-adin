name: Publish Site to gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Verify build output
        run: |
          test -f out/index.html
          test -d out/_next

      - name: Prepare GitHub Pages subpath build
        run: |
          set -e
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          DIST_DIR=".gh-pages-dist"

          rm -rf "$DIST_DIR"
          cp -a out "$DIST_DIR"

          find "$DIST_DIR" -type f -name '*.html' -print0 | xargs -0 sed -i \
            -e "s|href=\"/|href=\"/${REPO_NAME}/|g" \
            -e "s|src=\"/|src=\"/${REPO_NAME}/|g" \
            -e "s|\"/_next/|\"/${REPO_NAME}/_next/|g" \
            -e "s|\"/manifest.webmanifest|\"/${REPO_NAME}/manifest.webmanifest|g" \
            -e "s|\"/favicon.ico|\"/${REPO_NAME}/favicon.ico|g"

      - name: Publish out to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .gh-pages-dist
          publish_branch: gh-pages
          force_orphan: true
